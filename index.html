<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness App | Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card:hover { transform: translateY(-5px); transition: 0.3s; }
        .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <header class="bg-slate-800 p-4 sticky top-0 z-50 border-b border-slate-700">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black text-blue-500 tracking-tighter italic">FITNESS<span class="text-white">DB</span></h1>
            <div class="flex gap-2 w-full md:w-auto">
                <select id="filter-part" class="bg-slate-700 border-none rounded-lg px-3 py-2 text-sm w-full">
                    <option value="">Cualquier parte del cuerpo</option>
                </select>
                <button id="btn-random" class="bg-blue-600 hover:bg-blue-500 p-2 rounded-lg"><i class="fas fa-random"></i></button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <div class="relative max-w-xl mx-auto mb-8">
            <input type="text" id="search" placeholder="Busca un ejercicio..." class="w-full bg-slate-800 border border-slate-700 rounded-full py-3 px-12 focus:ring-2 focus:ring-blue-500 outline-none">
            <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
        </div>

        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <!-- Cargando... -->
        </div>

        <div id="loading" class="flex justify-center my-20">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-700 h-12 w-12"></div>
        </div>

        <div class="flex justify-center mt-10 gap-4 pb-10">
            <button id="prev" class="bg-slate-800 px-5 py-2 rounded-lg disabled:opacity-30">Anterior</button>
            <span id="page-txt" class="py-2 font-mono text-blue-400"></span>
            <button id="next" class="bg-slate-800 px-5 py-2 rounded-lg disabled:opacity-30">Siguiente</button>
        </div>
    </main>

    <!-- Modal de Detalles -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-slate-800 w-full max-w-2xl rounded-2xl overflow-hidden max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="m-name" class="text-2xl font-bold text-blue-400"></h2>
                    <button onclick="closeM()" class="text-2xl">&times;</button>
                </div>
                <img id="m-img" src="" class="w-full bg-white rounded-xl mb-4">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="bg-slate-700 p-3 rounded-lg text-center">
                        <p class="text-xs text-slate-400 uppercase">Equipo</p>
                        <p id="m-eq" class="font-bold text-sm"></p>
                    </div>
                    <div class="bg-slate-700 p-3 rounded-lg text-center">
                        <p class="text-xs text-slate-400 uppercase">Objetivo</p>
                        <p id="m-tr" class="font-bold text-sm"></p>
                    </div>
                </div>
                <h3 class="font-bold mb-2">Instrucciones:</h3>
                <p id="m-inst" class="text-slate-400 text-sm leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script>
        let db = [];
        let filtered = [];
        let page = 1;
        const perPage = 12;
        const ASSETS = "https://raw.githubusercontent.com/hasaneyldrm/exercises-dataset/main/videos/";

        // 1. Cargar Datos
        async function load() {
            try {
                const r = await fetch('./data/exercises.json');
                db = await r.json();
                filtered = db;
                
                // Llenar filtro de partes
                const parts = [...new Set(db.map(x => x.body_part))].sort();
                parts.forEach(p => {
                    document.getElementById('filter-part').innerHTML += `<option value="${p}">${p}</option>`;
                });

                document.getElementById('loading').classList.add('hidden');
                render();
            } catch (e) { alert("Error cargando ejercicios. Verifica la carpeta /data"); }
        }

        // 2. Mostrar Ejercicios
        function render() {
            const start = (page - 1) * perPage;
            const end = start + perPage;
            const items = filtered.slice(start, end);

            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(ex => `
                <div class="card bg-slate-800 rounded-xl overflow-hidden border border-slate-700 cursor-pointer" onclick="openM('${ex.id}')">
                    <img src="${ASSETS}${ex.id}.gif" class="w-full h-48 object-cover bg-white" loading="lazy">
                    <div class="p-4">
                        <p class="text-blue-500 text-[10px] font-bold uppercase">${ex.body_part}</p>
                        <h3 class="font-bold text-sm line-clamp-1">${ex.name}</h3>
                    </div>
                </div>
            `).join('');

            const totalPages = Math.ceil(filtered.length / perPage);
            document.getElementById('page-txt').innerText = `${page} / ${totalPages || 1}`;
            document.getElementById('prev').disabled = page === 1;
            document.getElementById('next').disabled = page >= totalPages;
        }

        // 3. Filtrar
        function filter() {
            const query = document.getElementById('search').value.toLowerCase();
            const part = document.getElementById('filter-part').value;

            filtered = db.filter(ex => {
                return ex.name.toLowerCase().includes(query) && 
                       (part === "" || ex.body_part === part);
            });

            page = 1;
            render();
        }

        // 4. Modal
        function openM(id) {
            const ex = db.find(x => x.id === id);
            document.getElementById('m-name').innerText = ex.name;
            document.getElementById('m-img').src = `${ASSETS}${ex.id}.gif`;
            document.getElementById('m-eq').innerText = ex.equipment;
            document.getElementById('m-tr').innerText = ex.target;
            document.getElementById('m-inst').innerText = Array.isArray(ex.instructions_en) ? ex.instructions_en.join(' ') : ex.instructions_en;
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeM() { document.getElementById('modal').classList.add('hidden'); }

        // Eventos
        document.getElementById('search').oninput = filter;
        document.getElementById('filter-part').onchange = filter;
        document.getElementById('next').onclick = () => { page++; render(); window.scrollTo(0,0); };
        document.getElementById('prev').onclick = () => { page--; render(); window.scrollTo(0,0); };
        document.getElementById('btn-random').onclick = () => openM(db[Math.floor(Math.random()*db.length)].id);

        load();
    </script>
</body>
</html>
